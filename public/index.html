<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowBrowse | Standalone</title>
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>
    <style>
        /* Re-insert your previous CSS here */
        :root { --bg: #121212; --accent: #bb86fc; --text: #e0e0e0; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        #nav { display: flex; padding: 10px; gap: 10px; background: #1e1e1e; }
        input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #444; background: #000; color: #fff; }
        #tabs { display: flex; background: #000; padding: 5px 5px 0; gap: 5px; }
        .tab { padding: 8px 15px; background: #2c2c2c; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 12px; }
        .tab.active { background: #1e1e1e; color: var(--accent); }
        iframe { flex: 1; border: none; background: white; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div id="tabs"></div>
<div id="nav">
    <button onclick="createNewTab()">+</button>
    <input type="text" id="url-input" placeholder="Type a URL and press Enter..." onkeypress="if(e=event,e.key==='Enter') navigate(e.target.value)">
</div>
<div id="viewports" style="flex:1; display:flex; flex-direction:column;"></div>

<script>
    let tabs = [];
    let activeId = null;

    function createNewTab() {
        const id = 'tab-' + Date.now();
        tabs.push({ id, title: 'New Tab' });
        
        const ifr = document.createElement('iframe');
        ifr.id = `frame-${id}`;
        document.getElementById('viewports').appendChild(ifr);
        
        switchTab(id);
    }

    function switchTab(id) {
        activeId = id;
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        document.getElementById(`frame-${id}`).classList.add('active');
        renderTabs();
    }

    function renderTabs() {
        const container = document.getElementById('tabs');
        container.innerHTML = '';
        tabs.forEach(t => {
            const el = document.createElement('div');
            el.className = `tab ${t.id === activeId ? 'active' : ''}`;
            el.innerText = t.title;
            el.onclick = () => switchTab(t.id);
            container.appendChild(el);
        });
    }

    async function navigate(url) {
        if (!url.startsWith('http')) url = 'https://' + url;
        const frame = document.getElementById(`frame-${activeId}`);
        
        // Ensure UV Service Worker is ready
        await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix });
        
        frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
        tabs.find(t => t.id === activeId).title = new URL(url).hostname;
        renderTabs();
    }

    createNewTab();
</script>
</body>
</html>
