<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Web Proxy</title>
    <style>
        :root { --bg: #1e1e1e; --text: #ffffff; --accent: #0078d4; --tab-bg: #2d2d2d; }
        body.light-mode { --bg: #f3f3f3; --text: #000000; --tab-bg: #e0e0e0; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Tab Bar */
        #tab-bar { display: flex; background: #000; padding: 5px 5px 0 5px; gap: 2px; }
        .tab { padding: 8px 20px; background: var(--tab-bg); border-radius: 8px 8px 0 0; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 10px; min-width: 100px; }
        .tab.active { background: var(--bg); border-bottom: 2px solid var(--accent); }
        .close-tab { color: #ff5f56; font-weight: bold; }

        /* Navigation Bar */
        #nav-bar { display: flex; padding: 10px; gap: 10px; background: var(--bg); align-items: center; border-bottom: 1px solid #444; }
        #url-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #555; background: #333; color: white; outline: none; }
        button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 18px; }

        /* Viewport */
        .viewport-container { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: white; }
        iframe.active { display: block; }

        /* Settings Overlay */
        #settings-panel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--tab-bg); padding: 20px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; z-index: 100;
        }
    </style>
</head>
<body class="dark-mode">

<div id="tab-bar">
    <div id="tabs-list" style="display: flex; gap: 5px;"></div>
    <button onclick="addTab()" style="font-size: 20px; margin-left: 10px;">+</button>
</div>

<div id="nav-bar">
    <button onclick="location.reload()">↻</button>
    <input type="text" id="url-input" placeholder="Search or enter URL..." onkeypress="handleKey(event)">
    <button onclick="toggleSettings()">⚙️</button>
</div>

<div class="viewport-container" id="viewports"></div>

<div id="settings-panel">
    <h3>Settings</h3>
    <label>Theme: </label>
    <select onchange="document.body.className = this.value + '-mode'">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
    </select>
    <br><br>
    <label><input type="checkbox" id="stealth-mode"> Stealth Mode (Hide Title)</label>
    <br><br>
    <button onclick="toggleSettings()" style="background: var(--accent); padding: 5px 15px; border-radius: 5px;">Close</button>
</div>

<script>
    let tabs = [];
    let activeTabId = null;

    function addTab() {
        const id = Date.now();
        const tab = { id, url: 'about:blank', title: 'New Tab' };
        tabs.push(tab);
        
        // Create Iframe
        const ifr = document.createElement('iframe');
        ifr.id = `frame-${id}`;
        document.getElementById('viewports').appendChild(ifr);
        
        switchTab(id);
        renderTabs();
    }

    function renderTabs() {
        const list = document.getElementById('tabs-list');
        list.innerHTML = '';
        tabs.forEach(t => {
            const div = document.createElement('div');
            div.className = `tab ${t.id === activeTabId ? 'active' : ''}`;
            div.innerHTML = `<span>${t.title}</span> <span class="close-tab" onclick="closeTab(event, ${t.id})">×</span>`;
            div.onclick = () => switchTab(t.id);
            list.appendChild(div);
        });
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        const activeFrame = document.getElementById(`frame-${id}`);
        activeFrame.classList.add('active');
        document.getElementById('url-input').value = activeFrame.src.includes('/proxy?url=') 
            ? decodeURIComponent(activeFrame.src.split('url=')[1]) 
            : '';
        renderTabs();
    }

    function closeTab(e, id) {
        e.stopPropagation();
        tabs = tabs.filter(t => t.id !== id);
        document.getElementById(`frame-${id}`).remove();
        if (activeTabId === id && tabs.length > 0) switchTab(tabs[0].id);
        if (tabs.length === 0) addTab();
        renderTabs();
    }

    function handleKey(e) {
        if (e.key === 'Enter') {
            let url = e.target.value;
            if (!url.startsWith('http')) url = 'https://' + url;
            const activeFrame = document.getElementById(`frame-${activeTabId}`);
            activeFrame.src = `/proxy?url=${encodeURIComponent(url)}`;
            
            // Update tab title
            const tab = tabs.find(t => t.id === activeTabId);
            tab.title = url.split('//')[1].split('/')[0];
            renderTabs();
        }
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    // Initialize with one tab
    addTab();
</script>
</body>
</html>
