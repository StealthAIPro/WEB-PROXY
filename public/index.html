<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowBrowse Pro</title>
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>
    <style>
        /* Add a simple style for the login gate */
        #auth-gate { position: fixed; inset: 0; background: #121212; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-gate">
    <h1 style="color:#bb86fc">ShadowBrowse Login</h1>
    <input type="email" id="email" placeholder="Email" style="margin:5px; padding:10px;">
    <input type="password" id="pass" placeholder="Password" style="margin:5px; padding:10px;">
    <button onclick="handleSignIn()" style="margin-top:10px; padding:10px 30px;">Login</button>
</div>

<div id="main-ui" class="hidden">
    <div id="tab-bar">
        <div id="tabs-list"></div>
        <button onclick="createNewTab()">+</button>
    </div>
    <div id="nav-bar">
        <input type="text" id="url-input" onkeypress="handleUrlInput(event)">
        <button onclick="signOutUser()">Logout</button>
    </div>
    <div id="viewports"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* YOUR CONFIG HERE */ };
    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);

    let currentUser = null;
    let tabs = [];

    // --- AUTH LOGIC ---
    window.handleSignIn = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
    };

    window.signOutUser = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            startSyncing();
        } else {
            location.reload(); // Hard reset on logout
        }
    });

    // --- FIRESTORE SYNCING ---
    function startSyncing() {
        // Listen for tab changes from other devices
        onSnapshot(doc(db, "users", currentUser.uid), (doc) => {
            if (doc.exists() && doc.data().tabs) {
                const remoteTabs = doc.data().tabs;
                if (JSON.stringify(remoteTabs) !== JSON.stringify(tabs)) {
                    // Logic to rebuild tabs from remote data
                    console.log("Syncing tabs from cloud...");
                }
            }
        });
    }

    async function syncToCloud() {
        if (!currentUser) return;
        await setDoc(doc(db, "users", currentUser.uid), {
            tabs: tabs.map(t => ({ id: t.id, title: t.title, url: t.url })),
            lastUpdated: Date.now()
        }, { merge: true });
    }

    // --- NAVIGATION LOGIC ---
    window.handleUrlInput = async (e) => {
        if (e.key === 'Enter') {
            const url = e.target.value;
            const activeFrame = document.querySelector('iframe.active');
            
            // Register UV Service Worker
            await navigator.serviceWorker.register('/uv/sw.js', { scope: __uv$config.prefix });
            
            activeFrame.src = __uv$config.prefix + __uv$config.encodeUrl(url);

            const tab = tabs.find(t => t.id === currentTabId);
            tab.url = url;
            tab.title = new URL(url).hostname;
            syncToCloud(); 
        }
    };

    // Initialize first tab
    window.createNewTab = () => {
        const id = 'tab-' + Date.now();
        tabs.push({ id, title: 'New Tab', url: '' });
        // Create Iframe logic...
        syncToCloud();
    };
</script>
</body>
</html>
