<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { background: #333; padding: 10px; display: flex; gap: 10px; }
        #url-input { flex-grow: 1; padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        iframe { flex-grow: 1; border: none; width: 100%; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="text" id="url-input" placeholder="Enter URL (e.g., https://example.com)">
    <button onclick="loadPage()">Go</button>
</div>

<iframe id="browser-viewport"></iframe>

<script>
    function loadPage() {
        const url = document.getElementById('url-input').value;
        const proxyUrl = `/proxy?url=${encodeURIComponent(url)}`;
        document.getElementById('browser-viewport').src = proxyUrl;
    }

    // Allow "Enter" key to trigger load
    document.getElementById('url-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadPage();
    });
</script>

</body>
</html>
